version: 1.0
runtime: python311
build:
  env:
    - name: UV_PROJECT_ENVIRONMENT
      value: /app/.venv
  commands:
    build:
      - pip install uv
      - uv sync --frozen --no-dev
run:
  runtime-version: 3.11.14
  env:
    - name: UV_PROJECT_ENVIRONMENT
      value: /app/.venv
    - name: ENVIRONMENT
      value: production
  command: uv run uvicorn app:app --host 0.0.0.0 --port 8080 --workers 2
  network:
    port: 8080
  observability:
    vendor-name: AWSXRAY
