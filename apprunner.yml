version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install uv
      - uv sync --frozen --no-dev
run:
  runtime-version: 3.11
  command: uv run uvicorn app:app --host 0.0.0.0 --port 8080 --workers 2
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: ENVIRONMENT
      value: production
  
